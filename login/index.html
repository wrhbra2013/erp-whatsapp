<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - ERP WhatsApp</title>
  <link rel="stylesheet" href="../static/css/default.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="icon" type="image/svg+xml" href="../static/css/favicon/favicon.svg">
  <link rel="icon" type="image/x-icon" href="../static/css/favicon/favicon.ico">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div style="text-align:center;margin-bottom:16px;">
        <div style="width:64px;height:64px;background:var(--brand-accent);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:2rem;color:white;">
          <i class="bi bi-whatsapp"></i>
        </div>
        <h1>ERP WhatsApp</h1>
        <p>Chatbot Inteligente para Atendimento</p>
      </div>
      <div id="loginError" style="color:var(--brand-danger);font-size:0.85rem;text-align:center;margin-bottom:16px;display:none;"></div>
      <form id="loginForm" onsubmit="return handleLogin(event)">
        <div class="form-group">
          <label>Usuário</label>
          <input type="text" id="username" class="form-control" placeholder="Nome ou email" required>
        </div>
        <div class="form-group">
          <label>Senha</label>
          <input type="password" id="password" class="form-control" placeholder="Sua senha" required>
        </div>
        <button type="submit" id="loginBtn" class="btn btn-primary btn-block btn-lg">
          <span id="loginBtnText">Entrar</span>
          <span id="loginSpinner" class="spinner" style="display:none;width:20px;height:20px;border-width:2px;"></span>
        </button>
      </form>
    </div>
  </div>
  <script src="../static/js/api.js"></script>
  <script>
    if (API.isAuthenticated()) window.location.href = '../index.html';

    function handleLogin(e) {
      e.preventDefault();
      var user = document.getElementById('username').value.trim();
      var pass = document.getElementById('password').value;
      var btn = document.getElementById('loginBtn');
      var spinner = document.getElementById('loginSpinner');
      var btnText = document.getElementById('loginBtnText');
      var errorEl = document.getElementById('loginError');

      btn.disabled = true; btnText.textContent = 'Entrando...';
      spinner.style.display = 'inline-block'; errorEl.style.display = 'none';

      API.login(user, pass)
        .then(function() { window.location.href = '../index.html'; })
        .catch(function(err) {
          errorEl.textContent = err.message || 'Erro ao fazer login';
          errorEl.style.display = 'block';
          btn.disabled = false; btnText.textContent = 'Entrar';
          spinner.style.display = 'none';
        });
      return false;
    }
  </script>
</body>
</html>
